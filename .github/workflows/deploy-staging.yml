name: Deploy Staging

on:
    push:
        branches: [develop]

concurrency:
    group: deploy-staging
    cancel-in-progress: false

jobs:
    deploy:
        name: deploy-staging
        runs-on: [self-hosted, smolla-platform-runner]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GHCR
              run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build image
              run: |
                  docker build \
                      --tag ghcr.io/adamsalisbury/smolla-presentations:staging \
                      --tag ghcr.io/adamsalisbury/smolla-presentations:staging-${{ github.sha }} \
                      .

            - name: Push image
              run: |
                  docker push ghcr.io/adamsalisbury/smolla-presentations:staging
                  docker push ghcr.io/adamsalisbury/smolla-presentations:staging-${{ github.sha }}

            # Image is pushed to GHCR. Container launch is not yet wired up:
            # the nginx sites-available config and docker-compose project for
            # smolla-presentations are not in place. Once smolla-infra adds them, swap this
            # comment for a call to ./deploy.sh staging.
