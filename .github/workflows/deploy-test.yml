name: Deploy to Test

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to build (e.g. feature/foo, hotfix/bar)'
                required: true
                type: string

concurrency:
    group: deploy-test
    cancel-in-progress: false

jobs:
    deploy:
        name: deploy-test
        runs-on: [self-hosted, smolla-platform-runner]

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.branch }}

            - name: Log in to GHCR
              run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build image
              run: |
                  docker build \
                      --tag ghcr.io/adamsalisbury/smolla-presentations:test \
                      --tag ghcr.io/adamsalisbury/smolla-presentations:test-${{ github.sha }} \
                      .

            - name: Push image
              run: |
                  docker push ghcr.io/adamsalisbury/smolla-presentations:test
                  docker push ghcr.io/adamsalisbury/smolla-presentations:test-${{ github.sha }}

            # Image is pushed to GHCR. Container launch is not yet wired up:
            # the nginx sites-available config and docker-compose project for
            # smolla-presentations are not in place. Once smolla-infra adds them, swap this
            # comment for a call to ./deploy.sh test.
