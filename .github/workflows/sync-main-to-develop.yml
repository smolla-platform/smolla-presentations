name: Sync main into develop

on:
    push:
        branches: [main]

concurrency:
    group: sync-main-to-develop
    cancel-in-progress: false

jobs:
    open-sync-pr:
        name: open-sync-pr
        runs-on: [self-hosted, smolla-platform-runner]
        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Determine sync need
              id: diff
              run: |
                  # Tree-diff, not commit-diff. After a normal develop->main
                  # promotion the merge commit on main is not on develop, so a
                  # commit-diff would always claim a sync is needed; the trees
                  # are identical and there is nothing to back-merge. We only
                  # want to open a PR when prod (main) actually contains
                  # content that develop does not — i.e. a hotfix.
                  git fetch --no-tags origin develop main
                  if git diff --quiet origin/develop origin/main; then
                      echo "has-changes=false" >> "$GITHUB_OUTPUT"
                  else
                      echo "has-changes=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Open or update sync PR
              if: steps.diff.outputs.has-changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  existing=$(gh pr list --base develop --head main --state open --json number --jq '.[0].number // empty')
                  if [[ -z "$existing" ]]; then
                      gh pr create \
                          --base develop \
                          --head main \
                          --title "chore: sync main into develop" \
                          --body "Automatically opened after a push to \`main\` (typically a hotfix). Merging this PR brings the prod-shipped change(s) back into \`develop\` so the next staging deploy is not a regression."
                  else
                      echo "Sync PR already open: #$existing"
                  fi
